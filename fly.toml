# NEXUS AI Agent —— Fly.io 部署配置
app = "nexus-ai-agent"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "uploads_data"
  destination = "/app/public/uploads"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
